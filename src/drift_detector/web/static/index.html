<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraform Drift Detector</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #f6f7fb; }
    body { margin: 0; padding: 24px; }
    header { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
    button, input { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #1f6feb; color: #fff; border: none; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; }
    .drift { color: #b42318; font-weight: 600; }
    .ok { color: #067647; font-weight: 600; }
    pre { background: #fff; padding: 12px; border-radius: 12px; overflow: auto; }
  </style>
</head>
<body>
  <header>
    <h1 style="margin:0; flex:1">Drift Dashboard</h1>
    <input id="apiKey" type="password" placeholder="API key (optional)" />
    <button id="refresh">Refresh</button>
    <button id="runScan">Run scan</button>
  </header>
  <table>
    <thead>
      <tr><th>Started</th><th>Workspace</th><th>Status</th><th>Deleted</th><th>Modified</th><th>Tags</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <h2>Report detail</h2>
  <pre id="detail">Select a scan to view JSON report.</pre>
  <script>
    const keyInput = document.getElementById('apiKey');
    const rows = document.getElementById('rows');
    const detail = document.getElementById('detail');
    keyInput.value = localStorage.getItem('drift_api_key') || '';

    function headers() {
      const h = { 'Content-Type': 'application/json' };
      const key = keyInput.value.trim();
      if (key) h['X-API-Key'] = key;
      return h;
    }

    async function loadScans() {
      localStorage.setItem('drift_api_key', keyInput.value.trim());
      const resp = await fetch('/api/scans', { headers: headers() });
      if (!resp.ok) throw new Error(await resp.text());
      const data = await resp.json();
      rows.innerHTML = '';
      for (const scan of data) {
        const tr = document.createElement('tr');
        const status = scan.has_drift ? '<span class="drift">DRIFT</span>' : '<span class="ok">OK</span>';
        tr.innerHTML = `
          <td>${scan.started_at}</td>
          <td>${scan.workspace}</td>
          <td>${status}</td>
          <td>${scan.summary.deleted}</td>
          <td>${scan.summary.modified}</td>
          <td>${scan.summary.tags_changed}</td>
          <td><button data-id="${scan.scan_id}">View</button></td>`;
        rows.appendChild(tr);
      }
      rows.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', () => loadDetail(btn.dataset.id));
      });
    }

    async function loadDetail(id) {
      const resp = await fetch('/api/scans/' + id, { headers: headers() });
      detail.textContent = JSON.stringify(await resp.json(), null, 2);
    }

    document.getElementById('refresh').onclick = () => loadScans().catch(err => alert(err));
    document.getElementById('runScan').onclick = async () => {
      const resp = await fetch('/api/scans/run', { method: 'POST', headers: headers() });
      if (!resp.ok) return alert(await resp.text());
      await loadScans();
      detail.textContent = JSON.stringify(await resp.json(), null, 2);
    };

    loadScans().catch(err => alert(err));
  </script>
</body>
</html>
